[package]
name = "autodiff-rs"
version = "0.1.0"
edition = "2024"

[workspace]
members = [
    "crates/autodiff",
    "crates/ir",
    "crates/ir_autodiff",
    "crates/ir_optimize",
]

[dependencies]
index_vec = "0.1"
nearly = "0.4.0"
autodiff = { path = "crates/autodiff" }
ir = { path = "crates/ir" }
ir_autodiff = { path = "crates/ir_autodiff" }
ir_optimize = { path = "crates/ir_optimize" }
cc = "1"
